<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>辉夜露卡 · Sunset Route</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main
      class="vn-stage"
      id="vnStage"
      style="--bg-image: url('./assets/bg-room.jpg'); --chara-image: url('./assets/ruka-portrait.png')"
    >
      <div class="vignette"></div>

      <header class="top-actions">
        <button id="toggleOpsBtn" class="icon-btn" type="button" title="步骤">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16"></path><path d="M4 12h16"></path><path d="M4 18h16"></path><path d="M6 4v4"></path><path d="M6 10v4"></path><path d="M6 16v4"></path></svg>
        </button>
        <button id="toggleSettingsBtn" class="icon-btn" type="button" title="设置">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
        <button id="toggleLogBtn" class="icon-btn" type="button" title="历史">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        </button>
        <button id="resetBtn" class="icon-btn" type="button" title="新章节">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><polyline points="23 20 23 14 17 14"></polyline><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path></svg>
        </button>
      </header>

      <section class="character-layer">
        <div class="character-sprite">
          <div class="character-glow"></div>
        </div>
      </section>

      <div class="options-overlay hidden" id="optionsOverlay"></div>

      <aside id="opsPanel" class="panel panel-left hidden">
        <h3>步骤 / 代码增减</h3>
        <div id="opsLog" class="ops-log"></div>
        <small class="hint">这里显示工具调用与变更摘要。</small>
      </aside>

      <aside id="settingsPanel" class="panel hidden">
        <h3>场景设置</h3>
        <label>模型
          <input id="modelInput" value="MiniMax-M2.7-highspeed" />
        </label>
        <label>Max Tokens
          <input id="maxTokensInput" type="number" min="128" max="4096" value="900" />
        </label>
        <label class="checkbox-row">
          <input id="streamModeCheckbox" type="checkbox" />
          流式输出（SSE）
        </label>
        <p class="usage-line" id="usageLine" title="最近一次完成请求的 Token 用量">用量：—</p>
        <label>背景图 URL
          <input id="bgUrlInput" placeholder="https://..." />
        </label>
        <label>角色图 URL
          <input id="charaUrlInput" placeholder="https://..." />
        </label>
        <label>背景图上传
          <input id="bgFileInput" type="file" accept="image/*" />
        </label>
        <label>立绘上传
          <input id="charaFileInput" type="file" accept="image/*" />
        </label>
        <button id="applySkinBtn" type="button">应用画面</button>
        <small class="hint">
          建议将你发的两张图保存到 `web/galgame/assets/bg-room.jpg` 和
          `web/galgame/assets/ruka-portrait.png`，就会自动作为默认画面。
        </small>
      </aside>

      <aside id="logPanel" class="panel hidden">
        <h3>对话记录</h3>
        <div id="chatLog" class="chat-log"></div>
      </aside>

      <section class="dialog-container">
        <div class="dialog-box">
          <div class="nameplate" id="speakerName">辉夜露卡 ✦</div>
          <div class="dialog-text" id="dialogText">正在连接剧情引擎...</div>
        </div>

        <form id="chatForm" class="input-bar">
          <textarea id="userInput" rows="1" required placeholder="输入剧情推进台词，或直接提开发任务..."></textarea>
          <div class="input-actions">
            <button id="cancelBtn" type="button" class="btn-cancel" disabled>停止</button>
            <button id="sendBtn" type="submit">发送</button>
          </div>
        </form>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
